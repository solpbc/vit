<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>explore — vit</title>
  <meta name="description" content="vit network explorer — live capability and vouch activity">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      color-scheme: light;
      --vit-green: #06D6A0;
      --vit-green-deep: #059669;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #111827;
      background: #ffffff;
      line-height: 1.6;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 20px 32px;
    }

    header {
      border-bottom: 2px solid var(--vit-green);
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    .header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    header h1 {
      margin: 0;
      line-height: 1;
    }

    header h1 a {
      display: inline-block;
      text-decoration: none;
    }

    header h1 svg {
      display: block;
      height: 28px;
      width: auto;
    }

    .tagline {
      margin: 6px 0 0;
      color: #4b5563;
      font-size: 1rem;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    nav a {
      color: var(--vit-green-deep);
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    nav a.active {
      color: var(--vit-green-deep);
      text-decoration: underline;
      text-decoration-color: var(--vit-green);
      text-underline-offset: 3px;
    }

    .nav-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--vit-green-deep);
      padding: 0;
      line-height: 1;
    }

    a {
      color: var(--vit-green-deep);
    }

    main {
      min-height: 240px;
    }

    .sub-nav {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    .sub-nav a {
      color: var(--vit-green-deep);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .sub-nav a:hover {
      text-decoration: underline;
    }

    .sub-nav a.active {
      text-decoration: underline;
      text-decoration-color: var(--vit-green);
      text-underline-offset: 3px;
    }

    main h1,
    main h2,
    main h3,
    main h4 {
      line-height: 1.25;
      margin-top: 1.5em;
      margin-bottom: 0.6em;
    }

    main p,
    main ul,
    main ol,
    main blockquote,
    main pre {
      margin-top: 0;
      margin-bottom: 1em;
    }

    pre,
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    pre {
      background: #f3f4f6;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
    }

    code {
      background: #f3f4f6;
      padding: 0.1em 0.3em;
      border-radius: 4px;
    }

    pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
    }

    hr {
      border: 0;
      border-top: 1px solid var(--vit-green);
      margin: 1.5em 0;
    }

    footer {
      margin-top: 36px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
      font-size: 0.9rem;
      color: #6b7280;
    }

    footer a {
      color: var(--vit-green-deep);
    }

    .cap-item {
      padding: 12px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .cap-item:last-child {
      border-bottom: none;
    }

    .cap-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .cap-meta {
      font-size: 0.85rem;
      color: #6b7280;
    }

    .cap-meta a {
      color: var(--vit-green-deep);
      text-decoration: none;
    }

    .cap-meta a:hover {
      text-decoration: underline;
    }

    .skill-item {
      padding: 12px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .skill-item:last-child {
      border-bottom: none;
    }

    .skill-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .skill-meta {
      font-size: 0.85rem;
      color: #6b7280;
    }

    .skill-tag {
      display: inline-block;
      background: #e5e7eb;
      color: #374151;
      font-size: 0.75rem;
      padding: 1px 6px;
      border-radius: 3px;
      margin-right: 4px;
    }

    .beacon-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .beacon-item:last-child {
      border-bottom: none;
    }

    .beacon-name a {
      color: var(--vit-green);
      text-decoration: none;
      font-weight: 600;
    }

    .beacon-name a:hover {
      text-decoration: underline;
    }

    .beacon-stats {
      font-size: 0.85rem;
      color: #6b7280;
      text-align: right;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .stat-card {
      background: #f3f4f6;
      padding: 16px;
      border-radius: 6px;
      border-left: 3px solid var(--vit-green);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--vit-green);
    }

    .stat-label {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 4px;
    }

    .empty-state {
      color: #6b7280;
      padding: 32px 0;
    }

    .load-more {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 16px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      color: var(--vit-green-deep);
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
    }

    .load-more:hover {
      background: #e5e7eb;
    }

    .pulse-indicator {
      display: inline-block;
      color: #6b7280;
      font-size: 0.85rem;
      margin-left: 12px;
    }

    .pulse-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--vit-green);
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .recent-activity {
      margin-top: 32px;
    }

    .recent-activity h3 {
      margin: 0 0 12px;
      font-size: 1rem;
      color: #374151;
    }

    .empty-state p {
      margin: 4px 0;
    }

    .empty-state a {
      color: var(--vit-green-deep);
    }

    .view-title {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .nav-toggle {
        display: block;
      }

      .header-bar {
        flex-wrap: wrap;
      }

      .header-bar > nav {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 8px;
        padding-top: 12px;
      }

      .header-bar > nav.open {
        display: flex;
      }

      .stat-grid {
        grid-template-columns: 1fr;
      }

      .beacon-item {
        flex-direction: column;
        gap: 4px;
      }

      .beacon-stats {
        text-align: left;
      }
    }

    .detail-header {
      margin-bottom: 20px;
    }

    .detail-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .detail-meta {
      font-size: 0.85rem;
      color: #6b7280;
    }

    .detail-meta a {
      color: var(--vit-green-deep);
      text-decoration: none;
    }

    .detail-meta a:hover {
      text-decoration: underline;
    }

    .detail-body {
      white-space: pre-wrap;
      background: #f3f4f6;
      padding: 16px;
      border-radius: 6px;
      margin: 16px 0;
      font-size: 0.9rem;
      line-height: 1.5;
      overflow-wrap: break-word;
    }

    .detail-section {
      margin-top: 24px;
    }

    .detail-section h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 0 0 8px;
      color: #374151;
    }

    .detail-link {
      display: inline-block;
      margin-top: 16px;
      font-size: 0.85rem;
    }

    .kind-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 3px;
      margin-left: 8px;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      background-color: #f3f4f6;
      color: #374151;
    }

    .kind-badge.kind-feat {
      background-color: #d1fae5;
      color: #065f46;
    }

    .kind-badge.kind-fix {
      background-color: #fef3c7;
      color: #92400e;
    }

    .kind-badge.kind-docs {
      background-color: #dbeafe;
      color: #1e40af;
    }

    .kind-badge.kind-test {
      background-color: #ede9fe;
      color: #5b21b6;
    }

    .kind-badge.kind-refactor {
      background-color: #f3f4f6;
      color: #374151;
    }

    .kind-badge.kind-chore {
      background-color: #f3f4f6;
      color: #374151;
    }

    .kind-badge.kind-perf {
      background-color: #fce7f3;
      color: #9d174d;
    }

    .kind-badge.kind-style {
      background-color: #e0e7ff;
      color: #3730a3;
    }

    .kind-badge.kind-security {
      background-color: #fee2e2;
      color: #991b1b;
    }

    .command-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
    }

    .command-row code {
      flex: 1;
      background: #f3f4f6;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .copy-btn {
      background: none;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.75rem;
      color: #374151;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: #f3f4f6;
    }

    .tag-pill {
      display: inline-block;
      background: #e5e7eb;
      color: #374151;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 3px;
      margin: 0 4px 4px 0;
      text-decoration: none;
      cursor: pointer;
    }

    .tag-pill:hover {
      background: #d1d5db;
    }

    .vouch-item {
      padding: 6px 0;
      font-size: 0.85rem;
      color: #6b7280;
    }

    .not-found {
      color: #6b7280;
      padding: 32px 0;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-bar">
        <h1><a href="https://v-it.org" aria-label="vit">
        <svg viewBox="0 0 56 34" xmlns="http://www.w3.org/2000/svg" height="28" aria-hidden="true">
          <circle cx="16" cy="6" r="3" fill="#06D6A0"/>
          <path d="M5.5 11 L16 27 L26.5 11" stroke="#06D6A0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="33.5" cy="6" r="3" fill="#06D6A0"/>
          <line x1="33.5" y1="12.5" x2="33.5" y2="27" stroke="#06D6A0" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="45" y1="7" x2="45" y2="27" stroke="#06D6A0" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="39" y1="12.5" x2="51" y2="12.5" stroke="#06D6A0" stroke-width="3.5" stroke-linecap="round"/>
        </svg>
        </a></h1>
        <button class="nav-toggle" aria-label="Menu" aria-expanded="false">&#9776;</button>
        <nav>
          <a href="https://v-it.org/">home</a>
          <a href="https://v-it.org/start/">start</a>
          <a href="/" class="active">explore</a>
          <a href="https://v-it.org/doctrine/">doctrine</a>
          <a href="https://v-it.org/vocab/">vocab</a>
          <a href="https://v-it.org/architecture/">architecture</a>
          <a href="https://github.com/solpbc/vit">github</a>
        </nav>
      </div>
      <p class="tagline">open source is social<span id="pulse" class="pulse-indicator"></span></p>
    </header>

    <main id="content">
      <nav class="sub-nav">
        <a href="#">caps</a>
        <a href="#skills">skills</a>
        <a href="#beacons">beacons</a>
        <a href="#stats">stats</a>
      </nav>
      <div id="view"></div>
    </main>

    <footer>
      part of <a href="https://solpbc.org">sol pbc</a>. created by <a href="https://bsky.app/profile/jeremie.com">Jeremie Miller</a>. vit is a trademark of sol pbc.
    </footer>
  </div>

  <script>
    // Mobile nav toggle
    document.querySelector('.nav-toggle').addEventListener('click', function() {
      var nav = this.parentNode.querySelector('nav');
      var open = nav.classList.toggle('open');
      this.setAttribute('aria-expanded', open);
      this.textContent = open ? '\u2715' : '\u2630';
    });

    let capsCursor = null;
    let capsContainer = null;
    let currentBeaconFilter = null;
    let skillsCursor = null;
    let skillsContainer = null;
    let currentSkillTag = null;

    function timeAgo(dateStr) {
      const now = Date.now();
      const then = new Date(dateStr).getTime();
      const seconds = Math.floor((now - then) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return minutes + (minutes === 1 ? ' minute ago' : ' minutes ago');
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return hours + (hours === 1 ? ' hour ago' : ' hours ago');
      const days = Math.floor(hours / 24);
      if (days === 1) return 'yesterday';
      if (days <= 7) return days + ' days ago';
      return new Date(dateStr).toISOString().split('T')[0];
    }

    function displayName(cap) {
      if (cap.handle) return cap.handle;
      const did = cap.did;
      if (did.length > 24) return did.slice(0, 12) + '...' + did.slice(-8);
      return did;
    }

    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function api(path) {
      const res = await fetch('/api/' + path);
      return res.json();
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(function() {
        var orig = btn.textContent;
        btn.textContent = 'copied!';
        setTimeout(function() { btn.textContent = orig; }, 1500);
      });
    }

    function getRoute() {
      const hash = location.hash.slice(1);
      if (hash.startsWith('cap/')) return { view: 'cap', value: decodeURIComponent(hash.slice(4)) };
      if (hash.startsWith('skill/')) return { view: 'skill', value: decodeURIComponent(hash.slice(6)) };
      if (hash.startsWith('beacon/')) return { view: 'beacon', value: decodeURIComponent(hash.slice(7)) };
      if (hash === 'beacons') return { view: 'beacons' };
      if (hash.startsWith('skills')) {
        var qmark = hash.indexOf('?');
        if (qmark !== -1) {
          var params = new URLSearchParams(hash.slice(qmark + 1));
          return { view: 'skills', tag: params.get('tag') || null };
        }
        return { view: 'skills' };
      }
      if (hash === 'stats') return { view: 'stats' };
      return { view: 'caps' };
    }

    function updateNav() {
      const route = getRoute();
      document.querySelectorAll('.sub-nav a').forEach(function(a) {
        const href = a.getAttribute('href');
        if (route.view === 'caps' || route.view === 'cap') a.classList.toggle('active', href === '#');
        else if (route.view === 'skills' || route.view === 'skill') a.classList.toggle('active', href === '#skills');
        else if (route.view === 'beacons' || route.view === 'beacon') a.classList.toggle('active', href === '#beacons');
        else if (route.view === 'stats') a.classList.toggle('active', href === '#stats');
        else a.classList.remove('active');
      });
    }

    function renderCapItem(cap) {
      const title = esc(cap.title) || 'untitled';
      const name = esc(displayName(cap));
      const ref = cap.ref ? '<code>' + esc(cap.ref) + '</code>' : '';
      const beacon = cap.beacon ? '<a href="#beacon/' + encodeURIComponent(cap.beacon) + '">' + esc(cap.beacon) + '</a>' : '';
      const time = timeAgo(cap.created_at);
      const metaParts = [name, beacon, ref, time].filter(Boolean);
      const titleHtml = cap.ref
        ? '<a href="#cap/' + encodeURIComponent(cap.ref) + '">' + title + '</a>'
        : title;
      return '<div class="cap-item"><div class="cap-title">' + titleHtml + '</div><div class="cap-meta">' + metaParts.join(' · ') + '</div></div>';
    }

    function renderSkillItem(skill) {
      const name = esc(skill.name) || 'unnamed';
      const desc = skill.description ? '<div>' + esc(skill.description) + '</div>' : '';
      const author = esc(displayName(skill));
      const version = skill.version ? 'v' + esc(skill.version) : '';
      const tags = skill.tags ? skill.tags.split(',').map(function(t) { return '<span class="skill-tag">' + esc(t.trim()) + '</span>'; }).join('') : '';
      const time = timeAgo(skill.created_at);
      const metaParts = [author, version, time].filter(Boolean);
      return '<div class="skill-item"><div class="skill-title"><a href="#skill/' + encodeURIComponent(skill.name) + '">' + name + '</a></div>' + desc + '<div class="skill-meta">' + metaParts.join(' · ') + (tags ? ' · ' + tags : '') + '</div></div>';
    }

    function appendLoadMore(el) {
      const existing = el.querySelector('.load-more');
      if (existing) existing.remove();

      if (!capsCursor) return;

      const btn = document.createElement('button');
      btn.className = 'load-more';
      btn.textContent = 'load more';
      btn.onclick = async function() {
        btn.disabled = true;
        btn.textContent = 'loading...';
        const path = 'caps?cursor=' + encodeURIComponent(capsCursor) + (currentBeaconFilter ? '&beacon=' + encodeURIComponent(currentBeaconFilter) : '');
        const data = await api(path);
        capsCursor = data.cursor;
        capsContainer.innerHTML += data.caps.map(renderCapItem).join('');
        btn.remove();
        appendLoadMore(el);
      };
      el.appendChild(btn);
    }

    function appendSkillsLoadMore(el) {
      const existing = el.querySelector('.load-more');
      if (existing) existing.remove();

      if (!skillsCursor) return;

      const btn = document.createElement('button');
      btn.className = 'load-more';
      btn.textContent = 'load more';
      btn.onclick = async function() {
        btn.disabled = true;
        btn.textContent = 'loading...';
        const tagParam = currentSkillTag ? '&tag=' + encodeURIComponent(currentSkillTag) : '';
        const data = await api('skills?cursor=' + encodeURIComponent(skillsCursor) + tagParam);
        skillsCursor = data.cursor;
        skillsContainer.innerHTML += data.skills.map(renderSkillItem).join('');
        btn.remove();
        appendSkillsLoadMore(el);
      };
      el.appendChild(btn);
    }

    async function renderCaps(el) {
      currentBeaconFilter = null;
      capsCursor = null;
      const data = await api('caps');
      capsCursor = data.cursor;

      if (data.caps.length === 0) {
        el.innerHTML = '<div class="empty-state"><p><strong>No caps yet.</strong></p><p>Caps are software capabilities published to the network. Ship the first one:</p><pre><code>vit ship --title "..." --description "..." --ref "..."</code></pre><p><a href="https://v-it.org/start/">Get started with vit →</a></p></div>';
        return;
      }

      el.innerHTML = '<div id="caps-list"></div>';
      capsContainer = document.getElementById('caps-list');
      capsContainer.innerHTML = data.caps.map(renderCapItem).join('');
      appendLoadMore(el);
    }

    async function renderCapDetail(el, ref) {
      var data = await api('cap?ref=' + encodeURIComponent(ref));
      if (!data.cap) {
        el.innerHTML = '<div class="not-found"><a href="#" class="back-link">&larr; back to caps</a><p><strong>Cap not found.</strong></p><p>No cap with ref <code>' + esc(ref) + '</code> was found.</p></div>';
        return;
      }
      var cap = data.cap;
      var record = null;
      if (cap.record_json) {
        try { record = JSON.parse(cap.record_json); } catch(e) {}
      }

      var kind = record && record.kind ? record.kind : null;
      var bodyText = record && record.text ? record.text : null;

      var kindBadge = '';
      if (kind) {
        kindBadge = '<span class="kind-badge kind-' + esc(kind) + '">' + esc(kind) + '</span>';
      }

      var title = esc(cap.title) || 'untitled';
      var author = esc(displayName(cap));
      var time = timeAgo(cap.created_at);
      var beacon = cap.beacon ? '<a href="#beacon/' + encodeURIComponent(cap.beacon) + '">' + esc(cap.beacon) + '</a>' : '';
      var metaParts = [author, beacon, time].filter(Boolean);

      var html = '<a href="#" class="back-link">&larr; caps</a>';
      html += '<div class="detail-header">';
      html += '<div class="detail-title">' + title + kindBadge + '</div>';
      html += '<div class="detail-meta">' + metaParts.join(' &middot; ') + '</div>';
      html += '</div>';

      if (bodyText) {
        html += '<div class="detail-body">' + esc(bodyText) + '</div>';
      }

      var vouchHtml = '';
      if (cap.uri) {
        try {
          var vouchData = await api('vouches?cap_uri=' + encodeURIComponent(cap.uri));
          var vouches = vouchData.vouches || [];
          if (vouches.length > 0) {
            vouchHtml = '<div class="detail-section"><h3>vouches (' + vouches.length + ')</h3>';
            vouches.forEach(function(v) {
              var vName = v.handle ? esc(v.handle) : esc(v.did);
              vouchHtml += '<div class="vouch-item">@' + vName + ' &middot; ' + timeAgo(v.created_at) + '</div>';
            });
            vouchHtml += '</div>';
          }
        } catch(e) {}
      }
      html += vouchHtml;

      html += '<div class="detail-section"><h3>commands</h3>';
      html += '<div class="command-row"><code>vit vet ' + esc(ref) + '</code><button class="copy-btn" data-copy="vit vet ' + esc(ref) + '">copy</button></div>';
      html += '<div class="command-row"><code>vit remix ' + esc(ref) + '</code><button class="copy-btn" data-copy="vit remix ' + esc(ref) + '">copy</button></div>';
      html += '</div>';

      if (cap.uri) {
        html += '<a href="https://pdsls.dev/at/' + esc(cap.uri.replace('at://', '')) + '" target="_blank" rel="noopener" class="detail-link">view on ATProto &rarr;</a>';
      }

      el.innerHTML = html;
    }

    async function renderSkillDetail(el, name) {
      var data = await api('skill?name=' + encodeURIComponent(name));
      if (!data.skill) {
        el.innerHTML = '<div class="not-found"><a href="#skills" class="back-link">&larr; back to skills</a><p><strong>Skill not found.</strong></p><p>No skill named <code>' + esc(name) + '</code> was found.</p></div>';
        return;
      }
      var skill = data.skill;
      var record = null;
      if (skill.record_json) {
        try { record = JSON.parse(skill.record_json); } catch(e) {}
      }

      var skillName = esc(skill.name) || 'unnamed';
      var author = esc(displayName(skill));
      var time = timeAgo(skill.created_at);
      var version = skill.version ? 'v' + esc(skill.version) : '';
      var desc = skill.description ? esc(skill.description) : '';

      var metaParts = [author, time].filter(Boolean);

      var html = '<a href="#skills" class="back-link">&larr; skills</a>';
      html += '<div class="detail-header">';
      html += '<div class="detail-title">/' + skillName;
      if (version) html += ' <span style="font-size:0.85rem;font-weight:normal;color:#6b7280">' + version + '</span>';
      html += '</div>';
      html += '<div class="detail-meta">' + metaParts.join(' &middot; ') + '</div>';
      html += '</div>';

      if (desc) {
        html += '<p>' + desc + '</p>';
      }

      var tags = skill.tags ? skill.tags.split(',') : [];
      if (record && record.tags && Array.isArray(record.tags)) {
        tags = record.tags;
      }
      if (tags.length > 0) {
        html += '<div style="margin: 12px 0">';
        tags.forEach(function(t) {
          var tag = t.trim ? t.trim() : t;
          if (tag) {
            html += '<a href="#skills?tag=' + encodeURIComponent(tag) + '" class="tag-pill">' + esc(tag) + '</a>';
          }
        });
        html += '</div>';
      }

      var license = record && record.license ? record.license : null;
      var compat = record && record.compatibility ? record.compatibility : null;
      if (license || compat) {
        html += '<div class="detail-meta" style="margin: 8px 0">';
        var infoParts = [];
        if (license) infoParts.push('license: ' + esc(license));
        if (compat) infoParts.push(esc(compat));
        html += infoParts.join(' &middot; ');
        html += '</div>';
      }

      var bodyText = record && record.text ? record.text : (skill.text || null);
      if (bodyText) {
        html += '<div class="detail-body">' + esc(bodyText) + '</div>';
      }

      var vouchHtml = '';
      if (skill.uri) {
        try {
          var vouchData = await api('vouches?cap_uri=' + encodeURIComponent(skill.uri));
          var vouches = vouchData.vouches || [];
          if (vouches.length > 0) {
            vouchHtml = '<div class="detail-section"><h3>vouches (' + vouches.length + ')</h3>';
            vouches.forEach(function(v) {
              var vName = v.handle ? esc(v.handle) : esc(v.did);
              vouchHtml += '<div class="vouch-item">@' + vName + ' &middot; ' + timeAgo(v.created_at) + '</div>';
            });
            vouchHtml += '</div>';
          }
        } catch(e) {}
      }
      html += vouchHtml;

      html += '<div class="detail-section"><h3>commands</h3>';
      html += '<div class="command-row"><code>vit learn skill-' + esc(name) + '</code><button class="copy-btn" data-copy="vit learn skill-' + esc(name) + '">copy</button></div>';
      html += '<div class="command-row"><code>vit learn skill-' + esc(name) + ' --user</code><button class="copy-btn" data-copy="vit learn skill-' + esc(name) + ' --user">copy</button></div>';
      html += '</div>';

      if (skill.uri) {
        html += '<a href="https://pdsls.dev/at/' + esc(skill.uri.replace('at://', '')) + '" target="_blank" rel="noopener" class="detail-link">view on ATProto &rarr;</a>';
      }

      el.innerHTML = html;
    }

    async function renderSkills(el, tag) {
      currentSkillTag = tag || null;
      skillsCursor = null;
      const data = await api(tag ? 'skills?tag=' + encodeURIComponent(tag) : 'skills');
      skillsCursor = data.cursor;
      const heading = tag
        ? '<h2 class="view-title">skills tagged "' + esc(tag) + '" <a href="#skills" style="font-size:0.85rem;font-weight:normal">clear filter</a></h2>'
        : '';

      if (data.skills.length === 0) {
        if (tag) {
          el.innerHTML = heading + '<div class="empty-state"><p>No skills found matching tag "' + esc(tag) + '".</p><p><a href="#skills">View all skills</a></p></div>';
        } else {
          el.innerHTML = heading + '<div class="empty-state"><p><strong>No skills yet.</strong></p><p>Skills are reusable agent instructions published to the network. Publish one:</p><pre><code>vit ship --skill</code></pre><p><a href="https://v-it.org/start/">Get started with vit →</a></p></div>';
        }
        return;
      }

      el.innerHTML = heading + '<div id="skills-list"></div>';
      skillsContainer = document.getElementById('skills-list');
      skillsContainer.innerHTML = data.skills.map(renderSkillItem).join('');
      appendSkillsLoadMore(el);
    }

    async function renderBeaconCaps(el, beacon) {
      currentBeaconFilter = beacon;
      capsCursor = null;
      const data = await api('caps?beacon=' + encodeURIComponent(beacon));
      capsCursor = data.cursor;

      const heading = '<h2 class="view-title">' + esc(beacon) + '</h2>';

      if (data.caps.length === 0) {
        el.innerHTML = heading + '<div class="empty-state"><p>no caps in this beacon yet</p></div>';
        return;
      }

      el.innerHTML = heading + '<div id="caps-list"></div>';
      capsContainer = document.getElementById('caps-list');
      capsContainer.innerHTML = data.caps.map(renderCapItem).join('');
      appendLoadMore(el);
    }

    async function renderBeacons(el) {
      const data = await api('beacons');

      if (data.beacons.length === 0) {
        el.innerHTML = '<div class="empty-state"><p><strong>No beacons yet.</strong></p><p>Beacons are project markers that connect repos to the vit network. Light one up:</p><pre><code>vit init</code></pre><p><a href="https://v-it.org/start/">Get started with vit →</a></p></div>';
        return;
      }

      el.innerHTML = data.beacons.map(function(beacon) {
        const name = esc(beacon.name);
        const time = beacon.last_activity ? timeAgo(beacon.last_activity) : 'no activity';
        return '<div class="beacon-item"><div class="beacon-name"><a href="#beacon/' + encodeURIComponent(beacon.name) + '">' + name + '</a></div><div class="beacon-stats">' + beacon.cap_count + ' caps · ' + beacon.vouch_count + ' vouches · ' + time + '</div></div>';
      }).join('');
    }

    async function renderStats(el) {
      const [stats, recentCaps, recentSkills] = await Promise.all([
        api('stats'),
        api('caps?limit=5'),
        api('skills?limit=5')
      ]);
      var totalActivity = stats.total_caps + stats.total_skills + stats.total_vouches;
      var earlyNetwork = totalActivity < 100;
      var contextLine = earlyNetwork ? '<p style="color:#6b7280;font-size:0.9rem;margin-bottom:16px;">vit is a young network. these numbers are growing &mdash; <a href="https://v-it.org/start/">join in</a>.</p>' : '';
      const grid = contextLine + '<div class="stat-grid">' +
        '<div class="stat-card"><div class="stat-number">' + stats.total_caps + '</div><div class="stat-label">capabilities</div></div>' +
        '<div class="stat-card"><div class="stat-number">' + stats.total_vouches + '</div><div class="stat-label">vouches</div></div>' +
        '<div class="stat-card"><div class="stat-number">' + stats.total_beacons + '</div><div class="stat-label">beacons</div></div>' +
        '<div class="stat-card"><div class="stat-number">' + stats.active_dids + '</div><div class="stat-label">active participants</div></div>' +
        '<div class="stat-card"><div class="stat-number">' + stats.total_skills + '</div><div class="stat-label">skills</div></div>' +
        '<div class="stat-card"><div class="stat-number">' + stats.skill_publishers + '</div><div class="stat-label">skill publishers</div></div>' +
        '</div>';

      const events = [];
      (recentCaps.caps || []).forEach(function(c) { events.push({ type: 'cap', label: c.title || c.ref || 'untitled', author: displayName(c), time: c.created_at }); });
      (recentSkills.skills || []).forEach(function(s) { events.push({ type: 'skill', label: s.name || 'unnamed', author: displayName(s), time: s.created_at }); });
      events.sort(function(a, b) { return (b.time || '').localeCompare(a.time || ''); });
      events.splice(5);

      let activity = '';
      if (events.length > 0) {
        activity = '<div class="recent-activity"><h3>recent activity</h3>' +
          events.map(function(e) {
            return '<div class="cap-item"><div class="cap-title">' + esc(e.label) + '</div><div class="cap-meta">' + esc(e.type) + ' · ' + esc(e.author) + ' · ' + timeAgo(e.time) + '</div></div>';
          }).join('') + '</div>';
      }

      el.innerHTML = grid + activity;
    }

    // Pulse indicator — check both caps and skills for most recent activity
    Promise.all([api('caps?limit=1'), api('skills?limit=1')]).then(function(results) {
      var capData = results[0], skillData = results[1];
      var latest = null;
      if (capData.caps && capData.caps.length > 0) latest = capData.caps[0].created_at;
      if (skillData.skills && skillData.skills.length > 0) {
        var skillTime = skillData.skills[0].created_at;
        if (!latest || skillTime > latest) latest = skillTime;
      }
      var el = document.getElementById('pulse');
      if (el && latest) {
        el.innerHTML = '<span class="pulse-dot"></span>last activity: ' + timeAgo(latest);
      }
    }).catch(function() {});

    document.addEventListener('click', function(e) {
      var btn = e.target.closest('.copy-btn[data-copy]');
      if (!btn) return;
      copyToClipboard(btn.getAttribute('data-copy'), btn);
    });

    async function navigate() {
      updateNav();
      const route = getRoute();
      const view = document.getElementById('view');

      if (route.view === 'caps') await renderCaps(view);
      else if (route.view === 'skills') await renderSkills(view, route.tag);
      else if (route.view === 'beacons') await renderBeacons(view);
      else if (route.view === 'beacon') await renderBeaconCaps(view, route.value);
      else if (route.view === 'stats') await renderStats(view);
      else if (route.view === 'cap') await renderCapDetail(view, route.value);
      else if (route.view === 'skill') await renderSkillDetail(view, route.value);
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  </script>
</body>
</html>
